<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel Analytics Lab — Valesca Bravo 2026</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: {
      navy: { DEFAULT:'#1d085e', light:'#2d1278', dark:'#130440' },
      teal: { DEFAULT:'#13d6c1', dark:'#0a9a88', light:'#3de8d6' }
    }}}}
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sora',sans-serif;background:#09071a;color:#e8e6f0;line-height:1.6;min-height:100vh}

    /* ── SYNTAX ── */
    .code-block{background:#141428;border-radius:10px;padding:.9rem 1.1rem;font-family:'DM Mono',monospace;font-size:.78rem;line-height:1.85;overflow-x:auto;border:1px solid #1e1e38;white-space:pre}
    .xl-fn{color:#4ec9b0;font-weight:600}
    .xl-str{color:#ce9178}
    .xl-cmt{color:#6a9955;font-style:italic}

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#110e2e}
    ::-webkit-scrollbar-thumb{background:#13d6c1;border-radius:3px}
    .tab-scroll{overflow-x:auto;scrollbar-width:thin}
    .tab-scroll::-webkit-scrollbar{height:3px}

    /* ── ANIMATION ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .28s ease forwards}

    /* ── RANGE ── */
    input[type=range]{-webkit-appearance:none;height:4px;background:#221b56;border-radius:4px;outline:none;width:100%;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#13d6c1;border-radius:50%}
    input[type=range]::-moz-range-thumb{width:16px;height:16px;background:#13d6c1;border-radius:50%;border:none}

    /* ── TABLE ── */
    .dt{width:100%;border-collapse:collapse;font-size:.77rem}
    .dt th{background:#1d085e;color:#13d6c1;padding:.42rem .7rem;text-align:left;font-weight:600;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase}
    .dt td{padding:.38rem .7rem;border-bottom:1px solid #1a1542;font-family:'DM Mono',monospace}
    .dt tr:hover td{background:#140f38}

    /* ── CARDS ── */
    .card{background:#110e2e;border:1px solid #1e1b46;border-radius:12px;padding:1.1rem 1.15rem;transition:border-color .2s}
    .card:hover{border-color:rgba(19,214,193,.25)}
    .analogy-box{background:linear-gradient(135deg,rgba(29,8,94,.55),rgba(10,154,136,.12));border-left:3px solid #13d6c1;border-radius:0 8px 8px 0;padding:.7rem .95rem;font-size:.84rem;line-height:1.65;margin-bottom:.85rem}
    .error-box{background:rgba(239,68,68,.07);border-left:3px solid #ef4444;border-radius:0 8px 8px 0;padding:.6rem .9rem;font-size:.82rem;color:#fca5a5;line-height:1.6}
    .tip-box{background:rgba(16,185,129,.07);border-left:3px solid #10b981;border-radius:0 8px 8px 0;padding:.6rem .9rem;font-size:.82rem;color:#6ee7b7;line-height:1.6}
    .result-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(10,154,136,.15);border:1px solid rgba(19,214,193,.3);border-radius:6px;padding:.22rem .6rem;font-family:'DM Mono',monospace;font-size:.77rem;color:#13d6c1}

    /* ── QUIZ ── */
    .qopt{background:#140f38;border:1px solid #1e1b46;border-radius:8px;padding:.58rem .85rem;cursor:pointer;transition:all .17s;font-size:.83rem;text-align:left;width:100%;color:#e8e6f0;font-family:'Sora',sans-serif}
    .qopt:hover:not(:disabled){border-color:#13d6c1;background:#1e1b46}
    .qopt.correct{border-color:#10b981;background:rgba(16,185,129,.12);color:#10b981}
    .qopt.wrong{border-color:#ef4444;background:rgba(239,68,68,.1);color:#ef4444}

    /* ── BUTTONS ── */
    .btn-ghost{background:transparent;border:1px solid #1e1b46;border-radius:6px;padding:.46rem .88rem;color:#8b86a8;cursor:pointer;font-size:.79rem;font-family:'Sora',sans-serif;transition:all .17s}
    .btn-ghost:hover:not(:disabled){border-color:#13d6c1;color:#e8e6f0}
    .btn-ghost:disabled{opacity:.35;cursor:not-allowed}
    .btn-primary{background:#13d6c1;color:#09071a;border:none;border-radius:6px;padding:.46rem .88rem;font-weight:700;font-size:.79rem;font-family:'Sora',sans-serif;cursor:pointer;transition:opacity .15s}
    .btn-primary:hover{opacity:.88}
    .btn-primary:disabled{background:#1e1b46;color:#3a3660;cursor:not-allowed;opacity:1}

    /* ── STEP PILL ── */
    .step-pill{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#1d085e;border:1px solid rgba(19,214,193,.4);border-radius:50%;font-size:.71rem;font-weight:700;color:#13d6c1;flex-shrink:0;font-family:'DM Mono',monospace}

    /* ── CHEAT SHEET CARD ── */
    .cs-card{background:#110e2e;border:1px solid #1e1b46;border-radius:8px;padding:.82rem;transition:border-color .2s,transform .18s}
    .cs-card:hover{border-color:rgba(19,214,193,.38);transform:translateY(-2px)}
    .cs-fn{color:#4ec9b0;font-family:'DM Mono',monospace;font-size:.81rem;font-weight:600}
    .cs-ex{font-family:'DM Mono',monospace;font-size:.7rem;color:#504d70;margin-top:.28rem}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ═══════════════════════════════════════════════
   SYNTAX HIGHLIGHTER
═══════════════════════════════════════════════ */
const XL_FNS = 'XLOOKUP|SORTBY|UNIQUE|FILTER|SORT|INDEX|MATCH|IFERROR|IFNA|IFS|SUMIFS|SUMIF|COUNTIFS|COUNTIF|AVERAGEIFS|AVERAGEIF|SUMPRODUCT|OFFSET|INDIRECT|TEXTJOIN|CONCAT|TEXT|TRIM|VALUE|ISNUMBER|ISTEXT|ISBLANK|ISERROR|FORECAST\\.LINEAR|NORM\\.DIST|NORM\\.INV|PERCENTILE\\.INC|PERCENTILE\\.EXC|PERCENTRANK\\.INC|QUARTILE\\.INC|STDEV\\.S|STDEV\\.P|RANK\\.EQ|CORREL|LINEST|SLOPE|INTERCEPT|RSQ|MAKEARRAY|SEQUENCE|LAMBDA|TAKE|CHOOSECOLS|EOMONTH|NETWORKDAYS|AVERAGE|MEDIAN|COUNTA|COUNT|MAXIFS|MINIFS|LARGE|SMALL|ROUNDUP|ROUNDDOWN|ROUND|POWER|TODAY|YEAR|MONTH|DATE|DAY|LEFT|RIGHT|MID|LEN|UPPER|LOWER|IF|OR|AND|NOT|SUM|MAX|MIN|ABS|INT|MOD|LET|VLOOKUP|HLOOKUP|CHOOSE|COVARIANCE\\.S';
const FRX = new RegExp(`(${XL_FNS})(?=\\s*\\()`, 'g');
function xlH(raw) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return raw.split('\n').map(line => {
    const el = esc(line);
    if (el.trim().startsWith('//')) return `<span class="xl-cmt">${el}</span>`;
    const ci = el.indexOf('//');
    let code = ci >= 0 ? el.slice(0,ci) : el;
    const cmt  = ci >= 0 ? `<span class="xl-cmt">${el.slice(ci)}</span>` : '';
    code = code.replace(/"([^"]*)"/g,'<span class="xl-str">"$1"</span>');
    code = code.replace(FRX,'<span class="xl-fn">$1</span>');
    return code + cmt;
  }).join('\n');
}

/* ═══════════════════════════════════════════════
   SHARED UI COMPONENTS
═══════════════════════════════════════════════ */
function Badge({ text, color='teal' }) {
  const C = {
    teal:  {bg:'rgba(19,214,193,.12)',bd:'rgba(19,214,193,.3)',tx:'#13d6c1'},
    navy:  {bg:'rgba(29,8,94,.45)',   bd:'rgba(157,143,245,.25)',tx:'#9d8ff5'},
    green: {bg:'rgba(16,185,129,.12)',bd:'rgba(16,185,129,.3)',  tx:'#10b981'},
    orange:{bg:'rgba(251,146,60,.12)',bd:'rgba(251,146,60,.3)',  tx:'#fb923c'},
    red:   {bg:'rgba(239,68,68,.1)', bd:'rgba(239,68,68,.3)',   tx:'#ef4444'},
    yellow:{bg:'rgba(234,179,8,.1)', bd:'rgba(234,179,8,.3)',   tx:'#eab308'},
  }[color]||{};
  return <span style={{background:C.bg,border:`1px solid ${C.bd}`,color:C.tx,borderRadius:'4px',padding:'.1rem .42rem',fontSize:'.67rem',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',fontFamily:'DM Mono, monospace',whiteSpace:'nowrap'}}>{text}</span>;
}

function SH2({ title, sub }) {
  return (
    <div style={{marginBottom:'1.2rem'}}>
      <h2 style={{fontSize:'1.15rem',fontWeight:700,color:'#e8e6f0',marginBottom:'.18rem'}}>{title}</h2>
      {sub && <p style={{color:'#8b86a8',fontSize:'.81rem'}}>{sub}</p>}
    </div>
  );
}

function Code({ code, label }) {
  return (
    <div>
      {label && <div style={{color:'#504d70',fontSize:'.66rem',textTransform:'uppercase',letterSpacing:'.09em',marginBottom:'.28rem',fontFamily:'DM Mono, monospace'}}>{label}</div>}
      <div className="code-block" dangerouslySetInnerHTML={{__html: xlH(code)}} />
    </div>
  );
}

function DT({ headers, rows, result }) {
  return (
    <div>
      <div style={{overflowX:'auto',borderRadius:'8px',border:'1px solid #1e1b46'}}>
        <table className="dt">
          <thead><tr>{headers.map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>{rows.map((r,i)=><tr key={i}>{r.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody>
        </table>
      </div>
      {result && <div style={{marginTop:'.45rem'}}><span className="result-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>{result}</span></div>}
    </div>
  );
}

function Analogy({ icon='🎯', text }) {
  return <div className="analogy-box"><span style={{marginRight:'.4rem'}}>{icon}</span>{text}</div>;
}
function Err({ text }) {
  return <div className="error-box" style={{marginTop:'.6rem'}}><strong style={{marginRight:'.4rem'}}>⚠ Error común:</strong>{text}</div>;
}
function Tip({ text }) {
  return <div className="tip-box" style={{marginTop:'.6rem'}}><strong style={{marginRight:'.4rem'}}>✓ Tip:</strong>{text}</div>;
}

/* FormulaCard — renders one formula block from a data object */
function FormulaCard({ d }) {
  const dc = {teal:'teal',esencial:'teal',intermedio:'orange',avanzado:'red',m365:'yellow',fechas:'navy',interactividad:'teal',segmentación:'green'}[(d.diff||'').toLowerCase()]||'teal';
  return (
    <div className="card" style={{marginBottom:'1.5rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:'.55rem',flexWrap:'wrap',marginBottom:'.82rem'}}>
        <h3 style={{fontSize:'.96rem',fontWeight:700,color:'#e8e6f0',fontFamily:'DM Mono, monospace'}}>{d.name}</h3>
        {d.tag && <span style={{color:'#8b86a8',fontSize:'.77rem'}}>{d.tag}</span>}
        <div style={{marginLeft:'auto'}}>{d.diff && <Badge text={d.diff} color={dc}/>}</div>
      </div>
      <Analogy icon={d.icon} text={d.analogy}/>
      <div style={{marginBottom:'.82rem'}}><Code code={d.code} label="Sintaxis y ejemplo"/></div>
      {d.table && <div style={{marginBottom:'.82rem'}}><DT {...d.table}/></div>}
      {d.error && <Err text={d.error}/>}
      {d.tip   && <Tip text={d.tip}/>}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   TAB CONTENT PLACEHOLDERS (filled per phase)
═══════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════
   PHASE 2 — FOUNDATIONS · LOOKUP · STATS
═══════════════════════════════════════════════ */

/* ── TAB 1: FOUNDATIONS ── */
const FOUND_FORMULAS = [
  {
    name:'Tablas estructuradas',tag:'Ctrl+T — la base de todo',diff:'Fundamental',icon:'🗃️',
    analogy:'Una tabla estructurada es como una base de datos local en Excel. A diferencia de un rango, tiene nombre propio, encabezados fijos y se expande sola cuando agregas filas. Las fórmulas que la referencian se actualizan automáticamente.',
    code:`// Convertir rango a tabla: Ctrl+T → asignar nombre descriptivo
// Referencias estructuradas:
=SUM(Ventas[Revenue])              // suma toda la columna
=COUNTIF(Campanas[Status],"Won")   // filtra por condición
=AVERAGE(Campanas[ROAS])           // promedio sin fijar rango

// La referencia Campanas[ROAS] se expande con los datos.
// Un rango fijo como C2:C100 NO lo hace.`,
    table:{
      headers:['Rango normal','Tabla estructurada'],
      rows:[
        ['=SUM(B2:B100) — se rompe al agregar filas','=SUM(Ventas[Revenue]) — auto-expandible'],
        ['Referencias opacas ($C$2:$C$200)','Nombres descriptivos en las fórmulas'],
        ['Ordenar puede romper otras fórmulas','Integración nativa con Power Query y pivots'],
      ]
    },
    tip:'Ctrl+T desde cualquier rango. Nombra la tabla en Diseño > Nombre de tabla. Nunca dejes el nombre genérico Tabla1.'
  },
  {
    name:'Nombres de rango',tag:'Legibilidad y mantenibilidad',diff:'Esencial',icon:'📖',
    analogy:'Un nombre de rango es como guardar un contacto en el teléfono: en vez de marcar +353-01-234-5678 escribes "Oficina". En Excel, en vez de $C$2:$C$500 escribes Presupuesto. Las fórmulas se vuelven legibles para cualquier persona del equipo.',
    code:`// Definir: Fórmulas > Administrador de nombres
// O: seleccionar rango → escribir nombre en el Cuadro de nombres

// Sin nombre (opaco):
=SUMIF($A$2:$A$500,"Q1",$C$2:$C$500)

// Con nombre (legible):
=SUMIF(Trimestre,"Q1",Presupuesto)

// Nombre dinámico con OFFSET (crece con los datos):
=OFFSET(Sheet1!$A$1, 0, 0, COUNTA(Sheet1!$A:$A), 1)`,
    error:'No uses espacios ni caracteres especiales. Usa_guiones_bajos o CamelCase. Los nombres son globales por defecto — en archivos con múltiples hojas similares pueden colisionar.'
  },
  {
    name:'Tipos de datos y el error silencioso',tag:'El diagnóstico previo',diff:'Diagnóstico',icon:'🔢',
    analogy:'Cuando importas un CSV, los números suelen llegar como texto. Tu SUM devuelve 0, tu ordenamiento es alfabético en vez de numérico y nadie sabe por qué el reporte está mal. Es el error más común y más invisible en análisis corporativo.',
    code:`// Detectar texto disfrazado de número:
=ISNUMBER(A2)          // FALSE = es texto aunque se vea como número
=LEN(TRIM(A2))<>LEN(A2) // TRUE = hay espacios ocultos

// Convertir texto a número:
=VALUE(TRIM(A2))       // TRIM elimina espacios, VALUE convierte
=A2*1                  // multiplicar por 1 fuerza la conversión
=--A2                  // doble negación — equivalente compacto

// Las fechas reales son números seriales en Excel:
// 1 ene 1900 = 1 / abr 2026 ≈ 45773
=ISNUMBER(A2)          // una fecha real devuelve TRUE`,
    table:{
      headers:['Valor visible','Tipo real','SUM','SORT'],
      rows:[
        ['"100" (texto)','Texto','0','100 antes que 20 (alfabético)'],
        ['100 (número)','Número','100','Correcto (numérico)'],
        ['"2026-04-25" (texto)','Texto','Error en date math','Orden lexicográfico'],
        ['45773 (serial)','Fecha/Número','45773','Cronológico correcto'],
      ]
    }
  },
  {
    name:'Reglas de higiene de datos',tag:'Lo que rompe silenciosamente el análisis',diff:'Crítico',icon:'🚫',
    analogy:'Mezclar datos con formato es como escribir tus contratos en el mismo papel que las notas de reunión. Parece eficiente hasta que alguien ejecuta un FILTER o una tabla dinámica — y entonces todo colapsa.',
    code:`// Las celdas combinadas son el enemigo del análisis:
// → Rompen FILTER, tablas dinámicas y Power Query
// → Solución: usar una columna de categoría separada

// Filas o columnas vacías dentro del dataset:
// → Excel asume que la tabla termina ahí
// → Solución: usar "Sin dato" o N/A como valor explícito

// Totales mezclados con datos en la misma columna:
// → Se suman a sí mismos en agregaciones
// → Solución: calcular totales en celdas de resumen separadas

// Colores como única señal de categoría:
// → Fórmulas y Power Query no leen formato, solo valores
// → Solución: agregar columna de texto con la categoría`,
    table:{
      headers:['Nunca hacer','Alternativa'],
      rows:[
        ['Celdas combinadas en datasets','Columna de categoría separada'],
        ['Filas/columnas vacías en medio del rango','Usar "Sin dato" como valor explícito'],
        ['Totales dentro del mismo dataset','Celdas de resumen fuera de la tabla'],
        ['Colores como única categorización','Columna de texto con el valor'],
        ['Comentarios en celdas de datos','Columna "Notas" al dataset'],
      ]
    }
  },
];

function FoundationsTab() {
  return (
    <div className="fade-up">
      <SH2 title="Fundamentos analíticos" sub="Antes de cualquier fórmula, la estructura de los datos lo determina todo."/>
      {FOUND_FORMULAS.map(d => <FormulaCard key={d.name} d={d}/>)}

      <SH2 title="¿Cuándo usar Excel, Python o Power BI?" sub="Criterios objetivos — sin fanáticos de ninguna herramienta."/>
      <div style={{overflowX:'auto',borderRadius:'12px',border:'1px solid #1e1b46',marginBottom:'1.25rem'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.77rem'}}>
          <thead>
            <tr style={{background:'#0d0b22'}}>
              {['Criterio','📊 Excel','🐍 Python','⚡ Power BI'].map((h,i)=>(
                <th key={h} style={{padding:'.58rem .82rem',textAlign:i===0?'left':'center',color:['#8b86a8','#4ec9b0','#dcdcaa','#fb923c'][i],fontSize:'.68rem',letterSpacing:'.07em',textTransform:'uppercase',fontWeight:700}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              ['Volumen de datos','< 500K filas','Sin límite práctico','< 1B filas (modelo)'],
              ['Audiencia','Cualquier usuario','Devs / analistas','Usuarios de negocio'],
              ['Automatización','Limitada (VBA)','Total (CI/CD, APIs)','Moderada (refresh)'],
              ['Código requerido','No','Sí','Mínimo (M y DAX)'],
              ['Curva de aprendizaje','Baja','Alta','Media'],
              ['Colaboración','OneDrive / SharePoint','Git / GitHub','Power BI Service'],
              ['Costo','Incluido en M365','Gratuito','~$10/usuario/mes'],
              ['Exploración ad-hoc','★★★★★','★★★☆☆','★★★☆☆'],
              ['Dashboards interactivos','★★☆☆☆','★★★☆☆','★★★★★'],
              ['Machine Learning','★☆☆☆☆','★★★★★','★★☆☆☆'],
            ].map(([criterio,...vals],i)=>(
              <tr key={criterio} style={{background:i%2===0?'transparent':'rgba(29,8,94,.07)'}}>
                <td style={{padding:'.42rem .82rem',color:'#c4c0d8',fontFamily:'DM Mono, monospace',borderBottom:'1px solid #1a1542'}}>{criterio}</td>
                {vals.map((v,j)=>(
                  <td key={j} style={{padding:'.42rem .82rem',textAlign:'center',color:['#4ec9b0','#dcdcaa','#fb923c'][j],fontFamily:'DM Mono, monospace',fontSize:'.75rem',borderBottom:'1px solid #1a1542'}}>{v}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(215px,1fr))',gap:'1rem'}}>
        {[
          {color:'#4ec9b0',title:'Usa Excel cuando…',items:['Datos < 500K filas','Audiencia sin herramientas especiales','Análisis ad-hoc o frecuencia semanal','Solo tienes acceso a M365']},
          {color:'#dcdcaa',title:'Usa Python cuando…',items:['Automatización total o APIs','Datos > 1M filas','Machine learning o estadística avanzada','El output es un sistema, no un reporte']},
          {color:'#fb923c',title:'Usa Power BI cuando…',items:['Múltiples fuentes que se actualizan solas','KPIs estandarizados con drill-down','Audiencia amplia sin habilidades técnicas','Presupuesto para licencias Pro']},
        ].map(({color,title,items})=>(
          <div key={title} className="card" style={{borderColor:`${color}33`}}>
            <h4 style={{color,fontWeight:700,fontSize:'.83rem',marginBottom:'.6rem'}}>{title}</h4>
            {items.map(it=>(
              <div key={it} style={{display:'flex',gap:'.45rem',marginBottom:'.28rem',fontSize:'.78rem',color:'#c4c0d8'}}>
                <span style={{color,flexShrink:0}}>›</span>{it}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── TAB 2: LOOKUP ── */
const LOOKUP_DATA = [
  {
    name:'XLOOKUP',tag:'El sucesor moderno de VLOOKUP',diff:'Esencial',icon:'🔍',
    analogy:'XLOOKUP es como la búsqueda de Google para tus tablas: le das lo que buscas, dónde buscar y qué devolver. Y puedes decirle exactamente qué mostrar cuando no encuentra nada. Sin restricciones de columnas, busca en cualquier dirección.',
    code:`// Buscar email de cliente por su ID:
=XLOOKUP(B2, Clientes[ID], Clientes[Email], "No encontrado")

// Devolver múltiples columnas a la vez:
=XLOOKUP(B2, Clientes[ID], Clientes[[Nombre]:[Email]:[Segmento]])

// Buscar el registro MÁS RECIENTE (search_mode=-1):
=XLOOKUP(B2, Pedidos[Cliente], Pedidos[Fecha], , 0, -1)

// Argumentos: lookup_value, lookup_array, return_array,
//             [if_not_found], [match_mode], [search_mode]`,

function CohortSimulator() {
  const [ret, setRet] = useState([100, 62, 45, 35, 28, 24, 21, 19, 18]);
  const bench = [100, 50, 35, 25, 20, 17, 15, 14, 13];

  const W=560, H=220, PL=42, PR=16, PT=18, PB=30;
  const iW=W-PL-PR, iH=H-PT-PB;
  const toX = i => PL + (i/8)*iW;
  const toY = v => PT + (1 - v/100)*iH;
  const pathD = pts => pts.map((v,i)=>`${i===0?'M':'L'}${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');

  const updateWeek = (idx, val) => {
    const next = [...ret];
    next[idx] = +val;
    for (let j = idx+1; j < next.length; j++) {
      if (next[j] > next[j-1]) next[j] = next[j-1];
    }
    setRet(next);
  };

  const drop1   = ret[0] - ret[1];
  const w4      = ret[4];
  const final   = ret[8];
  const vsBench = final - bench[8];

  return (
    <div>
      <div style={{marginBottom:'.85rem',padding:'.6rem .82rem',background:'rgba(19,214,193,.06)',border:'1px solid rgba(19,214,193,.18)',borderRadius:'8px',fontSize:'.8rem',color:'#9af0e8'}}>
        <strong style={{color:'#13d6c1'}}>Cómo usarlo:</strong> Ajusta los sliders para ingresar la retención por semana. La línea teal es tu cohorte; la gris punteada es un benchmark de SaaS típico.
      </div>

      {/* SVG Chart */}
      <div style={{overflowX:'auto',marginBottom:'.85rem'}}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{maxWidth:`${W}px`,display:'block'}}>
          <defs>
            <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#13d6c1" stopOpacity="0.18"/>
              <stop offset="100%" stopColor="#13d6c1" stopOpacity="0.02"/>
            </linearGradient>
          </defs>
          {/* Grid lines */}
          {[0,25,50,75,100].map(v=>(
            <g key={v}>
              <line x1={PL} y1={toY(v)} x2={W-PR} y2={toY(v)} stroke="#1a1542" strokeWidth="1"/>
              <text x={PL-5} y={toY(v)+4} textAnchor="end" fill="#3a3660" fontSize="9" fontFamily="DM Mono,monospace">{v}%</text>
            </g>
          ))}
          {/* X axis labels */}
          {ret.map((_,i)=>(
            <text key={i} x={toX(i)} y={H-8} textAnchor="middle" fill="#3a3660" fontSize="9" fontFamily="DM Mono,monospace">W{i}</text>
          ))}
          {/* Benchmark */}
          <path d={pathD(bench)} fill="none" stroke="#2a2650" strokeWidth="1.5" strokeDasharray="4 3"/>
          <text x={toX(7)+4} y={toY(bench[7])-5} fill="#3a3660" fontSize="8" fontFamily="DM Mono,monospace">Benchmark</text>
          {/* Area */}
          <path d={`${pathD(ret)} L${toX(8).toFixed(1)},${toY(0).toFixed(1)} L${toX(0).toFixed(1)},${toY(0).toFixed(1)}Z`} fill="url(#cg)"/>
          {/* User line */}
          <path d={pathD(ret)} fill="none" stroke="#13d6c1" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          {/* Dots */}
          {ret.map((v,i)=>(
            <g key={i}>
              <circle cx={toX(i)} cy={toY(v)} r="4" fill="#09071a" stroke="#13d6c1" strokeWidth="2"/>
              <text x={toX(i)} y={toY(v)-8} textAnchor="middle" fill="#13d6c1" fontSize="8" fontFamily="DM Mono,monospace">{v}%</text>
            </g>
          ))}
          <text x={PL+8} y={toY(ret[0])-13} fill="#13d6c1" fontSize="8" fontFamily="DM Mono,monospace" fontWeight="700">Tu cohorte</text>
        </svg>
      </div>

      {/* Sliders */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(96px,1fr))',gap:'.55rem',marginBottom:'.85rem'}}>
        {ret.map((v,i)=>(
          <div key={i} style={{background:'#0d0b22',border:'1px solid #1a1542',borderRadius:'8px',padding:'.6rem .55rem',textAlign:'center'}}>
            <div style={{fontSize:'.67rem',color:'#3a3660',marginBottom:'.28rem',fontFamily:'DM Mono, monospace'}}>Sem. {i}</div>
            {i===0
              ? <div style={{fontSize:'1.1rem',fontWeight:700,color:'#13d6c1',fontFamily:'DM Mono, monospace'}}>100%</div>
              : <>
                  <input type="range" min="0" max={ret[i-1]} value={v} onChange={e=>updateWeek(i,e.target.value)} style={{marginBottom:'.22rem'}}/>
                  <div style={{fontSize:'.9rem',fontWeight:700,color:'#13d6c1',fontFamily:'DM Mono, monospace'}}>{v}%</div>
                </>
            }
          </div>
        ))}
      </div>

      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:'.65rem'}}>
        {[
          {label:'Caída W0→W1',  value:`-${drop1}pp`,   color: drop1>50?'#ef4444':drop1>30?'#fb923c':'#10b981'},
          {label:'Retención W4', value:`${w4}%`,         color: w4>=30?'#10b981':w4>=20?'#fb923c':'#ef4444'},
          {label:'Retención W8', value:`${final}%`,      color: final>=15?'#10b981':final>=10?'#fb923c':'#ef4444'},
          {label:'vs Benchmark', value:`${vsBench>=0?'+':''}${vsBench}pp`, color: vsBench>=0?'#10b981':'#ef4444'},
        ].map(({label,value,color})=>(
          <div key={label} className="card" style={{textAlign:'center',padding:'.75rem'}}>
            <div style={{fontSize:'.68rem',color:'#8b86a8',marginBottom:'.25rem'}}>{label}</div>
            <div style={{fontSize:'1.28rem',fontWeight:800,color,fontFamily:'DM Mono, monospace'}}>{value}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function QuizSection() {
  const [qi, setQi]       = useState(0);
  const [chosen, setChosen] = useState(null);
  const [score, setScore]  = useState(0);
  const [done, setDone]    = useState(false);

  const q = QUIZ_DATA[qi];
  const answered = chosen !== null;

  function pick(idx) {
    if (answered) return;
    setChosen(idx);
    if (idx === q.ans) setScore(s => s+1);
  }

  function next() {
    if (qi < QUIZ_DATA.length-1) { setQi(qi+1); setChosen(null); }
    else setDone(true);
  }

  function restart() { setQi(0); setChosen(null); setScore(0); setDone(false); }

  return (
    <section style={{maxWidth:'740px',margin:'3rem auto',padding:'0 1rem 3rem'}}>
      <div style={{marginBottom:'1.4rem',textAlign:'center'}}>
        <h2 style={{fontSize:'1.15rem',fontWeight:700,color:'#e8e6f0',marginBottom:'.18rem'}}>Quiz de Verificación</h2>
        <p style={{color:'#8b86a8',fontSize:'.8rem'}}>5 preguntas — feedback inmediato</p>
      </div>

      {!done ? (
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
            <span style={{fontSize:'.73rem',color:'#8b86a8',fontFamily:'DM Mono, monospace'}}>{qi+1} / {QUIZ_DATA.length}</span>
            <span className="result-badge">{score} correctas</span>
          </div>

          {/* Progress bar */}
          <div style={{height:'3px',background:'#1a1542',borderRadius:'3px',marginBottom:'.95rem',overflow:'hidden'}}>
            <div style={{height:'100%',background:'#13d6c1',borderRadius:'3px',width:`${((qi+(answered?1:0))/QUIZ_DATA.length)*100}%`,transition:'width .35s ease'}}/>
          </div>

          <p style={{fontSize:'.9rem',color:'#e8e6f0',marginBottom:'.95rem',lineHeight:1.65}}>{q.q}</p>

          <div style={{display:'flex',flexDirection:'column',gap:'.45rem',marginBottom:'.95rem'}}>
            {q.opts.map((opt,idx)=>{
              let cls='qopt';
              if (answered) {
                if (idx===q.ans) cls+=' correct';
                else if (idx===chosen) cls+=' wrong';
              }
              return (
                <button key={idx} className={cls} onClick={()=>pick(idx)} disabled={answered}>
                  <span style={{color:'#3a3660',marginRight:'.5rem',fontFamily:'DM Mono, monospace',fontSize:'.78rem'}}>{['A','B','C','D'][idx]}</span>
                  {opt}
                </button>
              );
            })}
          </div>

          {answered && (
            <div className="tip-box" style={{marginBottom:'.95rem'}}>{q.exp}</div>
          )}

          <div style={{display:'flex',justifyContent:'flex-end'}}>
            <button className="btn-primary" onClick={next} disabled={!answered}>
              {qi < QUIZ_DATA.length-1 ? 'Siguiente →' : 'Ver resultado'}
            </button>
          </div>
        </div>
      ) : (
        <div className="card" style={{textAlign:'center',padding:'2rem 1.5rem'}}>
          <div style={{fontSize:'2.8rem',marginBottom:'.45rem'}}>
            {score===5?'🏆':score>=3?'🎯':'📖'}
          </div>
          <div style={{fontSize:'2.4rem',fontWeight:800,color:'#13d6c1',fontFamily:'DM Mono, monospace',marginBottom:'.3rem'}}>
            {score} / {QUIZ_DATA.length}
          </div>
          <p style={{color:'#8b86a8',fontSize:'.86rem',marginBottom:'1.4rem'}}>
            {score===5?'¡Perfecto! Dominas los fundamentos analíticos de Excel.':
             score>=3?'Bien. Repasa los conceptos donde dudaste.':
             'Revisa las secciones con más detalle — la práctica lo consolida.'}
          </p>
          <button className="btn-primary" onClick={restart}>Reintentar quiz</button>
        </div>
      )}
    </section>
  );
}

/* ═══════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════ */
const TABS = [
  {id:'foundations', icon:'🏗️', label:'Fundamentos'},
  {id:'lookup',      icon:'🔍', label:'Lookups'},
  {id:'stats',       icon:'📈', label:'Estadística'},
  {id:'powerquery',  icon:'⚡', label:'Power Query'},
  {id:'pivots',      icon:'🔄', label:'Tablas Dinámicas'},
  {id:'cases',       icon:'🎯', label:'Casos Reales'},
  {id:'cheatsheet',  icon:'📋', label:'Cheat Sheet'},
];

function App() {
  const [tab, setTab] = useState('foundations');

  function renderTab() {
    switch(tab) {
      case 'foundations': return typeof FoundationsTab !== 'undefined' ? <FoundationsTab/> : <Placeholder name="Fundamentos"/>;
      case 'lookup':      return typeof LookupTab      !== 'undefined' ? <LookupTab/>      : <Placeholder name="Lookups"/>;
      case 'stats':       return typeof StatsTab       !== 'undefined' ? <StatsTab/>       : <Placeholder name="Estadística"/>;
      case 'powerquery':  return typeof PowerQueryTab  !== 'undefined' ? <PowerQueryTab/>  : <Placeholder name="Power Query"/>;
      case 'pivots':      return typeof PivotsTab      !== 'undefined' ? <PivotsTab/>      : <Placeholder name="Tablas Dinámicas"/>;
      case 'cases':       return typeof CasesTab       !== 'undefined' ? <CasesTab/>       : <Placeholder name="Casos Reales"/>;
      case 'cheatsheet':  return typeof CheatSheetTab  !== 'undefined' ? <CheatSheetTab/>  : <Placeholder name="Cheat Sheet"/>;
      default:            return null;
    }

  return (
    <>
      {/* ── HERO ── */}
      <header style={{background:'linear-gradient(165deg,#09071a 0%,#14094e 55%,#09071a 100%)',borderBottom:'1px solid #1e1b46',padding:'2.5rem 1rem 2rem',textAlign:'center',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle at 1px 1px,#1a1542 1px,transparent 0)',backgroundSize:'28px 28px',opacity:.3,pointerEvents:'none'}}/>
        <div style={{position:'relative',maxWidth:'860px',margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'center',gap:'.65rem',flexWrap:'wrap',marginBottom:'1.2rem'}}>
            {[
              {href:'https://valescabravo.github.io/',     label:'← Back to Portfolio'},
              {href:'https://valescabravo.github.io/lab/', label:'← Back to the Lab'},
            ].map(({href,label})=>(
              <a key={href} href={href}
                style={{display:'inline-flex',alignItems:'center',color:'#8b86a8',fontSize:'.77rem',textDecoration:'none',border:'1px solid #1e1b46',borderRadius:'6px',padding:'.28rem .75rem',transition:'all .17s'}}
                onMouseOver={e=>{e.currentTarget.style.borderColor='#13d6c1';e.currentTarget.style.color='#e8e6f0'}}
                onMouseOut={e=>{e.currentTarget.style.borderColor='#1e1b46';e.currentTarget.style.color='#8b86a8'}}>
                {label}
              </a>
            ))}
          </div>
          <div style={{display:'flex',justifyContent:'center',gap:'.55rem',flexWrap:'wrap',marginBottom:'.82rem'}}>
            <Badge text="2026" color="teal"/>
            <Badge text="Interactive Lab" color="navy"/>
          </div>
          <h1 style={{fontSize:'clamp(1.7rem,5vw,2.75rem)',fontWeight:800,color:'#e8e6f0',letterSpacing:'-.02em',lineHeight:1.15,marginBottom:'.6rem'}}>
            Excel<span style={{color:'#13d6c1'}}> Analytics</span> Lab
          </h1>
          <p style={{color:'#8b86a8',fontSize:'.93rem',maxWidth:'480px',margin:'0 auto 1.2rem',lineHeight:1.65}}>
            Excel como herramienta analítica en entornos corporativos. Fórmulas, estadística, Power Query y tablas dinámicas — con casos reales de marketing y negocio.
          </p>
          <div style={{display:'flex',justifyContent:'center',gap:'.55rem',flexWrap:'wrap'}}>
            {['7 módulos','Simulador de cohortes','Quiz interactivo','Cheat Sheet'].map(t=>(
              <span key={t} style={{background:'rgba(29,8,94,.5)',border:'1px solid #1e1b46',borderRadius:'20px',padding:'.22rem .7rem',fontSize:'.73rem',color:'#8b86a8'}}>{t}</span>
            ))}
          </div>
        </div>
      </header>

      {/* ── TAB NAV ── */}
      <nav style={{borderBottom:'1px solid #1a1542',background:'#09071a',position:'sticky',top:0,zIndex:10}}>
        <div style={{maxWidth:'860px',margin:'0 auto'}}>
        <div className="tab-scroll" style={{display:'flex',padding:'0 .5rem'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{background:'transparent',border:'none',borderBottom:`2px solid ${tab===t.id?'#13d6c1':'transparent'}`,
                color:tab===t.id?'#13d6c1':'#8b86a8',padding:'.72rem .8rem',cursor:'pointer',
                fontFamily:'Sora, sans-serif',fontSize:'.77rem',fontWeight:tab===t.id?700:400,
                whiteSpace:'nowrap',transition:'all .17s',display:'flex',alignItems:'center',gap:'.3rem'}}>
              <span style={{fontSize:'.88rem'}}>{t.icon}</span>{t.label}
            </button>
          ))}
        </div>
        </div>
      </nav>

      {/* ── MAIN CONTENT ── */}
      <main style={{maxWidth:'860px',margin:'0 auto',padding:'2rem 1rem'}}>
        {renderTab()}
      </main>

      {/* ── QUIZ (rendered after tabs) ── */}
      {typeof QuizSection !== 'undefined' && <QuizSection/>}

      {/* ── FOOTER ── */}
      <footer style={{borderTop:'1px solid #1a1542',padding:'1.2rem 1rem',textAlign:'center',marginTop:'2rem'}}>
        <p style={{color:'#3a3660',fontSize:'.77rem',fontFamily:'DM Mono, monospace'}}>
          © 2026 Valesca Bravo — Interactive Lab
          <span style={{margin:'0 .55rem',color:'#1e1b46'}}>·</span>
          <a href="https://valescabravo.github.io/" style={{color:'#13d6c1',textDecoration:'none'}}>Portfolio</a>
        </p>
      </footer>
    </>
  );
}

function Placeholder({ name }) {
  return (
    <div className="fade-up" style={{textAlign:'center',padding:'3rem 1rem',color:'#504d70'}}>
      <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>⏳</div>
      <p style={{fontFamily:'DM Mono, monospace',fontSize:'.82rem'}}>Módulo "{name}" — en construcción</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
